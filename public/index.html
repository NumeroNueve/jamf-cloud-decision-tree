<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamf Cloud Offerings — AI Advisor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text-secondary: #5a5a56;
    --text-tertiary: #9a9a94;
    --blue: #185FA5;
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --green: #3B6D11;
    --green-bg: #eaf3de;
    --green-text: #27500a;
    --amber: #854F0B;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --red: #993556;
    --red-bg: #fbeaf0;
    --red-text: #4b1528;
    --warn-bg: #fef3e2;
    --warn-border: #f0a030;
    --warn-text: #7a4a08;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816;
      --surface: #222220;
      --surface2: #2a2a28;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #e8e7e2;
      --text-secondary: #a0a09a;
      --text-tertiary: #666660;
      --blue-bg: #0c2a44;
      --blue-text: #85b7eb;
      --green-bg: #17340a;
      --green-text: #97c459;
      --amber-bg: #412402;
      --amber-text: #ef9f27;
      --red-bg: #2a0e1c;
      --red-text: #ed93b1;
      --warn-bg: #2c1e08;
      --warn-border: #a06820;
      --warn-text: #f0a030;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 48px;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  .page-header .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }

  .page-header h1 {
    font-size: 28px;
    font-weight: normal;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 10px;
  }

  .page-header p {
    font-size: 14px;
    color: var(--text-secondary);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
  }

  .input-card {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 12px;
  }

  .input-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }

  .input-prompt {
    font-size: 18px;
    font-weight: normal;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .input-hint {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
    font-style: italic;
    line-height: 1.6;
    padding-left: 12px;
    border-left: 2px solid var(--border);
  }

  textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-strong);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
    resize: vertical;
    margin-bottom: 14px;
    transition: border-color .15s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--blue);
  }
  textarea::placeholder {
    color: var(--text-tertiary);
  }

  .submit-btn {
    display: block;
    width: 100%;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-strong);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    text-align: center;
  }
  .submit-btn:hover {
    background: var(--bg);
    border-color: var(--border-strong);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .loading {
    text-align: center;
    padding: 40px 20px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: var(--text-tertiary);
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%  { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 12px;
  }

  .result-badge {
    display: inline-block;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
  }

  .result-name {
    font-size: 26px;
    font-weight: normal;
    color: var(--text);
    margin-bottom: 8px;
  }

  .result-desc {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .result-features {
    margin-bottom: 18px;
    list-style: none;
  }

  .result-features li {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.8;
    padding-left: 14px;
    position: relative;
  }
  .result-features li::before {
    content: "\2192";
    position: absolute;
    left: 0;
    color: var(--text-tertiary);
  }

  .result-price {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 18px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
  }
  .result-price strong { color: var(--text); }

  .considerations {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    margin-bottom: 14px;
  }
  .considerations strong {
    color: var(--text-tertiary);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .warn-note {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    color: var(--warn-text);
    background: var(--warn-bg);
    border: 0.5px solid var(--warn-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-top: 14px;
    line-height: 1.6;
  }

  .restart-btn {
    display: block;
    width: 100%;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-tertiary);
    font-size: 12px;
    font-family: 'Courier New', monospace;
    letter-spacing: .04em;
    cursor: pointer;
    margin-top: 10px;
    transition: background .15s, color .15s;
    text-align: center;
  }
  .restart-btn:hover { background: var(--surface2); color: var(--text-secondary); }

  .error-msg {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: var(--red-text);
    background: var(--red-bg);
    border: 0.5px solid var(--red);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .input-context {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    padding: 10px 14px;
    margin-bottom: 14px;
    line-height: 1.6;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">Jamf &middot; GTM Reference Tool</div>
  <h1>Jamf Cloud Offerings<br>AI Advisor</h1>
  <p>Describe your customer's situation and get a hosting recommendation powered by AI.</p>
</div>

<div class="wrap" id="wrap">
  <div id="content"></div>
</div>

<script>
const OFFERINGS = {
  standard: {
    name: "Standard Cloud",
    icon: "\u2601\uFE0F",
    badgeBg: "var(--blue-bg)",
    badgeColor: "var(--blue-text)",
    price: "Regular SKU pricing (no hosting add-on)",
    warn: null
  },
  premium: {
    name: "Premium Cloud",
    icon: "\u2601\uFE0F\u2B50",
    badgeBg: "var(--green-bg)",
    badgeColor: "var(--green-text)",
    price: "$20,000/year hosting cost",
    warn: null
  },
  highcompliance: {
    name: "High Compliance Cloud",
    icon: "\u2601\uFE0F\uD83D\uDD12",
    badgeBg: "var(--amber-bg)",
    badgeColor: "var(--amber-text)",
    price: "$40,000/year hosting cost",
    warn: null
  },
  premiumplus: {
    name: "Premium Cloud Plus",
    icon: "\u2601\uFE0F\u2B50+",
    badgeBg: "var(--red-bg)",
    badgeColor: "var(--red-text)",
    price: "$50,000/year hosting cost",
    warn: "\u26A0\uFE0F Deprecation notice: Premium Cloud Plus will be discontinued in Q3\u2013Q4 2026 and replaced by FedCloud (a FedRAMP-authorized offering). Do not sell to new customers \u2014 reach out to @Doug Cooper or @Erin Ogren before proposing this environment."
  },
  fedcloud: {
    name: "Jamf FedCloud",
    icon: "\u2601\uFE0F\uD83C\uDDFA\uD83C\uDDF8",
    badgeBg: "var(--red-bg)",
    badgeColor: "var(--red-text)",
    price: "Pricing TBD \u2014 Targeting Q3 2026",
    warn: "Jamf FedCloud is not yet generally available. Expected launch: September 2026. For customers who need a solution today, consider High Compliance Cloud or contact your Jamf rep about interim options."
  }
};

function showInput(savedText) {
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="input-card">
      <div class="input-label">Describe the situation</div>
      <div class="input-prompt">Tell me about your customer's environment and needs.</div>
      <div class="input-hint">Include details like: industry, compliance requirements (FedRAMP, CJIS, StateRAMP, etc.), need for SIEM integration, upgrade control, GovCloud, device count, or any specific security concerns.</div>
      <textarea id="situation" placeholder="e.g. State government agency with 5,000 Macs. They need StateRAMP alignment and their security team wants SIEM log streaming. They also need to control when upgrades happen.">${savedText || ''}</textarea>
      <button class="submit-btn" id="submitBtn" onclick="submit()">Get Recommendation</button>
    </div>
  `;
  document.getElementById("situation").focus();
  document.getElementById("situation").addEventListener("keydown", function(e) {
    if (e.metaKey && e.key === "Enter") submit();
  });
}

async function submit() {
  const text = document.getElementById("situation").value.trim();
  if (!text) return;

  const content = document.getElementById("content");
  content.innerHTML = `<div class="loading"><span class="loading-dots">Analyzing your customer's situation</span></div>`;

  try {
    const res = await fetch("/api/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ description: text })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || "Request failed");
    }

    const data = await res.json();
    renderResult(data, text);
  } catch (err) {
    content.innerHTML = `
      <div class="error-msg">Error: ${err.message}</div>
      <button class="restart-btn" onclick="showInput('${text.replace(/'/g, "\\'")}')">Try again</button>
    `;
  }
}

function renderResult(data, originalText) {
  const o = OFFERINGS[data.offering] || OFFERINGS.standard;
  const feats = (data.relevant_features || []).map(f => `<li>${f}</li>`).join("");
  const warn = o.warn ? `<div class="warn-note">${o.warn}</div>` : "";
  const considerations = data.considerations
    ? `<div class="considerations"><strong>Also consider</strong>${data.considerations}</div>`
    : "";

  document.getElementById("content").innerHTML = `
    <div class="input-context">"${originalText.length > 200 ? originalText.slice(0, 200) + '...' : originalText}"</div>
    <div class="result-card">
      <div class="result-badge" style="background:${o.badgeBg};color:${o.badgeColor};">${o.icon} Recommended offering</div>
      <div class="result-name">${o.name}</div>
      <div class="result-desc">${data.summary}</div>
      <ul class="result-features">${feats}</ul>
      <div class="result-price">Hosting cost: <strong>${o.price}</strong></div>
      ${considerations}
      ${warn}
    </div>
    <button class="restart-btn" onclick="showInput('')">\u21BA Try another scenario</button>
  `;
}

showInput('');
</script>
</body>
</html>
