<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamf Cloud Offerings — Decision Tree</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text-secondary: #5a5a56;
    --text-tertiary: #9a9a94;
    --blue: #185FA5;
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --green: #3B6D11;
    --green-bg: #eaf3de;
    --green-text: #27500a;
    --amber: #854F0B;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --red: #993556;
    --red-bg: #fbeaf0;
    --red-text: #4b1528;
    --warn-bg: #fef3e2;
    --warn-border: #f0a030;
    --warn-text: #7a4a08;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816;
      --surface: #222220;
      --surface2: #2a2a28;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #e8e7e2;
      --text-secondary: #a0a09a;
      --text-tertiary: #666660;
      --blue-bg: #0c2a44;
      --blue-text: #85b7eb;
      --green-bg: #17340a;
      --green-text: #97c459;
      --amber-bg: #412402;
      --amber-text: #ef9f27;
      --red-bg: #2a0e1c;
      --red-text: #ed93b1;
      --warn-bg: #2c1e08;
      --warn-border: #a06820;
      --warn-text: #f0a030;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 48px;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  .page-header .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }

  .page-header h1 {
    font-size: 28px;
    font-weight: normal;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 10px;
  }

  .page-header p {
    font-size: 14px;
    color: var(--text-secondary);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
  }

  .tree-wrap {
    max-width: 680px;
    margin: 0 auto;
  }

  .breadcrumb {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    margin-bottom: 16px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: var(--text-tertiary);
    min-height: 18px;
  }

  .bc-item {
    cursor: pointer;
    color: var(--blue);
    text-decoration: none;
  }
  .bc-item:hover { text-decoration: underline; }
  .bc-sep { color: var(--border-strong); }

  .q-card {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 12px;
  }

  .q-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 18px;
    font-weight: normal;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .q-hint {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
    font-style: italic;
    line-height: 1.6;
    padding-left: 12px;
    border-left: 2px solid var(--border);
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .q-btn {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    text-align: left;
    line-height: 1.5;
  }
  .q-btn:hover {
    background: var(--bg);
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .q-btn:active { transform: scale(0.99); }

  .restart-btn {
    display: block;
    width: 100%;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-tertiary);
    font-size: 12px;
    font-family: 'Courier New', monospace;
    letter-spacing: .04em;
    cursor: pointer;
    margin-top: 10px;
    transition: background .15s, color .15s;
    text-align: center;
  }
  .restart-btn:hover { background: var(--surface2); color: var(--text-secondary); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 12px;
  }

  .result-badge {
    display: inline-block;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
  }

  .result-name {
    font-size: 26px;
    font-weight: normal;
    color: var(--text);
    margin-bottom: 8px;
  }

  .result-desc {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .result-features {
    margin-bottom: 18px;
    list-style: none;
  }

  .result-features li {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.8;
    padding-left: 14px;
    position: relative;
  }
  .result-features li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--text-tertiary);
  }

  .result-price {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 18px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
  }
  .result-price strong { color: var(--text); }

  .ask-btn {
    display: inline-block;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    cursor: pointer;
    margin-right: 6px;
    margin-bottom: 6px;
    transition: background .15s;
    text-align: left;
    line-height: 1.4;
  }
  .ask-btn:hover { background: var(--bg); border-color: var(--border-strong); }

  .warn-note {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    color: var(--warn-text);
    background: var(--warn-bg);
    border: 0.5px solid var(--warn-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-top: 14px;
    line-height: 1.6;
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 16px 0;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">Jamf · GTM Reference Tool</div>
  <h1>Jamf Cloud Offerings<br>Decision Guide</h1>
  <p>Answer a few questions to identify the right hosting environment for your customer.</p>
</div>

<div class="tree-wrap" id="tree-wrap">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="content"></div>
</div>

<script>
const OUTCOMES = {
  standard: {
    name: "Standard Cloud",
    icon: "☁️",
    badgeBg: "var(--blue-bg)",
    badgeColor: "var(--blue-text)",
    price: "Regular SKU pricing (no hosting add-on)",
    desc: "Jamf's core multi-tenant offering. Ideal for organizations without strict compliance or performance needs. Covers approximately 95% of customer requirements.",
    features: [
      "SOC 2 Type II + ISO 27001 certified",
      "Regional hosting (US, EU, APAC)",
      "Jamf-managed upgrades",
      "Standard encryption, backups & disaster recovery",
      "Supports CIS Benchmarks 1 & 2, CMMC, NIST 800-171"
    ],
    asks: ["What compliance certifications does Standard Cloud include?", "Which regions is Standard Cloud available in?"],
    warn: null
  },
  premium: {
    name: "Premium Cloud",
    icon: "☁️⭐",
    badgeBg: "var(--green-bg)",
    badgeColor: "var(--green-text)",
    price: "$20,000/year hosting cost",
    desc: "Builds on Standard Cloud with added operational control, security customization, and enhanced performance. Not positioned as 'single tenant' — focus on control and performance.",
    features: [
      "Customer-controlled upgrade scheduling",
      "IP safelisting",
      "Third-party SSL certificate support",
      "Secure port configuration",
      "Jamf Log Stream for SIEM integration",
      "Enhanced performance (more memory, additional nodes, autoscaling)",
      "Supports CIS 1&2, CMMC, NIST 800-171"
    ],
    asks: ["What SIEM integrations does Premium Cloud support?", "How does upgrade scheduling work in Premium Cloud?"],
    warn: null
  },
  highcompliance: {
    name: "High Compliance Cloud",
    icon: "☁️🔒",
    badgeBg: "var(--amber-bg)",
    badgeColor: "var(--amber-text)",
    price: "$40,000/year hosting cost",
    desc: "Purpose-built for regulated industries and public sector. Dedicated hosting in a compliance-certified environment, not shared with standard Jamf Cloud infrastructure.",
    features: [
      "StateRAMP and NIST 800-53 alignment with available audit results",
      "Dedicated, compliance-certified hosting environment",
      "Additional access controls and network restrictions",
      "Mandatory upgrade path (must stay on latest release)",
      "Elevated monitoring and logging",
      "Compliance Benchmarks & Blueprint support (coming Q2 2026)"
    ],
    asks: ["What is StateRAMP and does my org need it?", "What are the upgrade requirements for High Compliance Cloud?"],
    warn: "Note: Some features depend on third-party providers (e.g. ABM, App Installers, Jamf Remote Assist). Customers are responsible for procuring and maintaining required third-party services."
  },
  premiumplus: {
    name: "Premium Cloud Plus",
    icon: "☁️⭐+",
    badgeBg: "var(--red-bg)",
    badgeColor: "var(--red-text)",
    price: "$50,000/year hosting cost",
    desc: "Single-tenant, dedicated cloud environment hosted in AWS GovCloud. Targeted at enterprise and government-adjacent orgs with strict data residency, compliance, or performance needs.",
    features: [
      "AWS GovCloud hosted (US-only)",
      "U.S. citizens only can access the environment",
      "IP safelisting, third-party SSL, secure port config",
      "Jamf Log Stream for SIEM integration",
      "Supports FISMA, CJIS, PCI-DSS, DFARS, ITAR, DoD SRG L2/4/5 alignment"
    ],
    asks: ["What is the difference between Premium Cloud Plus and FedCloud?", "Is Jamf Pro FedRAMP authorized?"],
    warn: "⚠️ Deprecation notice: Premium Cloud Plus will be discontinued in Q3–Q4 2026 and replaced by FedCloud (a FedRAMP-authorized offering). Do not sell to new customers — reach out to @Doug Cooper or @Erin Ogren before proposing this environment. Note: AWS GovCloud is FedRAMP-compliant infrastructure, but Jamf Pro itself is NOT FedRAMP authorized."
  }
};

const NODES = {
  start: {
    id: "start",
    q: "Does the customer operate under a government, federal, or defense compliance framework?",
    hint: "Think: FedRAMP, FISMA, CJIS, ITAR, DFARS, DoD SRG, or a requirement for U.S.-citizen-only data access.",
    answers: [
      { label: "Yes — federal/defense/government-level requirements", next: "fedgov" },
      { label: "No — or unsure", next: "regulated" }
    ]
  },
  fedgov: {
    id: "fedgov",
    q: "Is the customer explicitly required to be in a FedRAMP-authorized environment?",
    hint: "FedRAMP authorization means Jamf Pro itself is authorized — not just hosted in GovCloud infrastructure.",
    answers: [
      { label: "Yes — must be FedRAMP authorized", next: "fedcloud_note" },
      { label: "Needs GovCloud infrastructure or U.S.-citizen access controls", next: "premiumplus_warn" }
    ]
  },
  fedcloud_note: {
    id: "fedcloud_note",
    q: "FedCloud is coming in Q3–Q4 2026",
    hint: "Jamf's official FedRAMP-authorized offering (FedCloud) is not yet available. If a customer requires true FedRAMP authorization today, that product does not exist yet.",
    answers: [
      { label: "Customer can wait for FedCloud (Q3–Q4 2026)", outcome: "premiumplus" },
      { label: "Customer cannot wait — explore alternatives", next: "fedcloud_alt" }
    ]
  },
  fedcloud_alt: {
    id: "fedcloud_alt",
    q: "What is the primary driver behind the FedRAMP requirement?",
    hint: "Understanding the 'why' often reveals whether an alternative path exists.",
    answers: [
      { label: "Vendor risk assessment / InfoSec checklist", outcome: "premiumplus" },
      { label: "Strict contractual or regulatory mandate (no flexibility)", outcome: "premiumplus" }
    ]
  },
  premiumplus_warn: {
    id: "premiumplus_warn",
    q: "Does the customer need U.S.-citizen-only access or GovCloud-hosted infrastructure?",
    hint: "Examples: 'Our data can only be accessed by U.S. citizens,' 'We need AWS GovCloud,' or handling DoD/federal contract data.",
    answers: [
      { label: "Yes — GovCloud / U.S.-citizen access required", outcome: "premiumplus" },
      { label: "Not strictly required — evaluate state/local compliance needs", next: "regulated" }
    ]
  },
  regulated: {
    id: "regulated",
    q: "Does the customer have strict regulatory or compliance requirements beyond standard SaaS certifications?",
    hint: "Think: StateRAMP, NIST 800-53, third-party vendor risk assessments, or audit trail requirements for their management platform itself.",
    answers: [
      { label: "Yes — state/local government, defense contractors, or strict regulated industry", next: "hcc_check" },
      { label: "No — standard security needs or common benchmarks are sufficient", next: "control_needs" }
    ]
  },
  hcc_check: {
    id: "hcc_check",
    q: "Does the customer need the hosting platform itself to meet compliance certification?",
    hint: "This is the 'dual compliance' question — they need both device endpoint security AND infrastructure-level compliance for the management platform.",
    answers: [
      { label: "Yes — infrastructure-level compliance certification required", outcome: "highcompliance" },
      { label: "Endpoint compliance controls are sufficient", next: "control_needs" }
    ]
  },
  control_needs: {
    id: "control_needs",
    q: "Does the customer need operational control or security customization beyond standard SaaS?",
    hint: "Think: scheduling their own upgrades, IP safelisting, custom SSL certificates, SIEM log streaming, or enhanced performance.",
    answers: [
      { label: "Yes — needs upgrade control, IP safelisting, SIEM integration, or custom SSL", next: "siem_check" },
      { label: "No — standard Jamf-managed hosting is fine", outcome: "standard" }
    ]
  },
  siem_check: {
    id: "siem_check",
    q: "What is the primary operational need driving this?",
    hint: "All of the following are Premium Cloud features — this helps confirm fit and shape the right conversation.",
    answers: [
      { label: "SIEM / log streaming is a requirement", outcome: "premium" },
      { label: "Upgrade scheduling or IP safelisting is the primary need", outcome: "premium" },
      { label: "Enhanced performance or dedicated resources needed", outcome: "premium" }
    ]
  }
};

let history = [];

function render(nodeId) {
  if (nodeId === "restart") { history = []; render("start"); return; }
  const node = NODES[nodeId];
  if (!node) return;
  if (node.outcome) { renderOutcome(node.outcome); return; }

  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = history.map((h, i) =>
    `<span class="bc-item" onclick="jumpTo(${i})">${h.label}</span><span class="bc-sep"> › </span>`
  ).join("") + `<span style="color:var(--text-tertiary)">Question ${history.length + 1}</span>`;

  let html = `<div class="q-card">
    <div class="q-label">Question ${history.length + 1} of ~4</div>
    <div class="q-text">${node.q}</div>`;
  if (node.hint) html += `<div class="q-hint">${node.hint}</div>`;
  html += `<div class="btn-row">`;
  node.answers.forEach((a, i) => {
    html += `<button class="q-btn" onclick="choose('${nodeId}', ${i})">${a.label}</button>`;
  });
  html += `</div></div>`;
  if (history.length > 0) html += `<button class="restart-btn" onclick="render('restart')">↺ Start over</button>`;

  document.getElementById("content").innerHTML = html;
}

function choose(nodeId, idx) {
  const answer = NODES[nodeId].answers[idx];
  history.push({ nodeId, label: answer.label.length > 36 ? answer.label.slice(0, 34) + "…" : answer.label });
  if (answer.outcome) renderOutcome(answer.outcome);
  else render(answer.next);
}

function jumpTo(idx) {
  history = history.slice(0, idx);
  render(idx === 0 ? "start" : NODES[history[idx - 1]?.nodeId]?.id || "start");
}

function renderOutcome(key) {
  const o = OUTCOMES[key];
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = history.map((h, i) =>
    `<span class="bc-item" onclick="jumpTo(${i})">${h.label}</span><span class="bc-sep"> › </span>`
  ).join("") + `<span style="color:var(--text-tertiary)">Recommendation</span>`;

  const feats = o.features.map(f => `<li>${f}</li>`).join("");
  const asks = o.asks.map(q => `<button class="ask-btn">${q}</button>`).join("");
  const warn = o.warn ? `<div class="warn-note">${o.warn}</div>` : "";

  document.getElementById("content").innerHTML = `
    <div class="result-card">
      <div class="result-badge" style="background:${o.badgeBg};color:${o.badgeColor};">${o.icon} Recommended offering</div>
      <div class="result-name">${o.name}</div>
      <div class="result-desc">${o.desc}</div>
      <ul class="result-features">${feats}</ul>
      <div class="result-price">Hosting cost: <strong>${o.price}</strong></div>
      <div>${asks}</div>
      ${warn}
    </div>
    <button class="restart-btn" onclick="render('restart')">↺ Start over</button>
  `;
}

render("start");
</script>
</body>
</html>
